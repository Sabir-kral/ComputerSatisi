version: '3.8'

services:
  # --- VERİLƏNLƏR BAZASI ---
  db:
    image: mysql:8.0
    container_name: pc-store-db
    restart: always
    env_file: .env
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306" # Həm server, həm lokal (IntelliJ) girişi üçün
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- BACKEND (SPRING BOOT) ---
  backend:
    build: .
    container_name: pc-store-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      # Docker daxilində bazaya "db" adı ilə qoşulur
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/${MYSQL_DATABASE}
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}

  # --- FRONTEND (REACT/VUE/NEXT) ---
  frontend:
    # Qovluq demo-nun yanında olduğu üçün bir addım geri (..) çıxırıq
    build: ../frontEnd
    container_name: pc-store-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NODE_ENV=production

networks:
  default:
    name: pc-store-network