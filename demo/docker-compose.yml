version: '3.8'

services:
  # --- VERİLƏNLƏR BAZASI ---
  db:
    image: mysql:8.0
    container_name: pc-store-db
    restart: always
    env_file: .env
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- BACKEND (SPRING BOOT) ---
  backend:
    build: .
    container_name: pc-store-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/${MYSQL_DATABASE}
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}

  # --- FRONTEND (HTML/CSS/JS) ---
  frontend:
    build: ../frontEnd
    container_name: pc-store-frontend
    ports:
      - "3000:80"  # Brauzerdə yenə 3000 yazacaqsan, amma daxildə Nginx 80 ilə işləyir
    depends_on:
      - backend
    # Sadə HTML üçün environment: NODE_ENV ehtiyac deyil, sildim ki, sürətli olsun

networks:
  default:
    name: pc-store-network